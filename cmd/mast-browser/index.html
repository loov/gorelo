<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>mast-browser</title>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<div id="sidebar">
			<h2>mast-browser</h2>
			{{range .Pkgs}}
			<h2>{{.Path}}</h2>
			{{range .Files}}<a href="/file?path={{.Rel}}" target="src"
				>{{.Label}}</a
			>
			{{end}} {{end}}
		</div>
		<div id="content"><iframe name="src"></iframe></div>
	</body>
</html>
