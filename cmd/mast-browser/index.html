<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>mast-browser</title>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<div id="sidebar">
			<div id="sidebar-header">
				<span>mast-browser</span>
				<button id="theme-toggle"></button>
			</div>
			{{range .Pkgs}}
			<h2>{{.Path}}</h2>
			{{range .Files}}<a href="/file?path={{.Rel}}" target="src"
				>{{.Rel}}{{if .BuildTag}} <span class="chip">{{.BuildTag}}</span>{{end}}</a
			>
			{{end}} {{end}}
		</div>
		<div id="content"><iframe name="src"></iframe></div>
		<script src="/theme.js"></script>
	</body>
</html>
